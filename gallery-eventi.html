<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fino Demons | Tifoseria</title>
    <meta name="description" content="Foto eventi dei Fino Demons.">
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.jpg" alt="Logo Fino Demons">
                <span class="nav-logo-text">Fino Demons</span>
            </a>
            <div class="nav-menu">
                <a href="index.html">Home</a>
                <a href="gallery.html">Gallery</a>
            </div>
        </div>
    </nav>

    <main class="section gallery-detail-page">
        <div class="container">
            <div class="gallery-page-top">
                <a href="gallery.html" class="gallery-back-link">
                    <i class="fa-solid fa-arrow-left"></i> Torna alla gallery
                </a>
                <h1 class="page-title">Tifoseria</h1>
                <p class="section-subtitle">I seguaci dei Demons che vivono per la squadra.</p>
            </div>

            <div class="gallery-grid-detailed">
                <img src="images/gallery/eventi/evento1.jpg" alt="Evento 1" class="gallery-photo">
                <img src="images/gallery/eventi/evento2.jpg" alt="Evento 2" class="gallery-photo">
                <img src="images/gallery/eventi/evento3.jpg" alt="Evento 3" class="gallery-photo">
                <img src="images/gallery/eventi/evento4.jpg" alt="Evento 4" class="gallery-photo">
                <img src="images/gallery/eventi/evento5.jpg" alt="Evento 5" class="gallery-photo">
                <img src="images/gallery/eventi/evento6.jpg" alt="Evento 6" class="gallery-photo">
            </div>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-image" id="lightbox-image" alt="Foto ingrandita">
    </div>

    <footer>
        <div class="container">
            <div class="footer-logo">
                <img src="images/logo.jpg" alt="Logo Fino Demons">
            </div>
            <p class="footer-text">Fino Demons - Fino Mornasco (CO)</p>
            <p class="footer-text">&copy; 2026 Fino Demons</p>
        </div>
    </footer>

    <script src="js/gallery.js"></script>
</body>
</html>
