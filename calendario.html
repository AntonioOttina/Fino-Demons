<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fino Demons | Calendario e Risultati</title>
    <meta name="description" content="Calendario, risultati e classifica dei Fino Demons.">
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.jpg" alt="Logo Fino Demons">
                <span class="nav-logo-text">Fino Demons</span>
            </a>
            <div class="nav-menu">
                <a href="index.html">Home</a>
            </div>
        </div>
    </nav>

    <!-- CONTENUTO -->
    <main class="section">
        <div class="container">

            <h1 class="page-title">Calendario e Risultati</h1>
            <p class="section-subtitle">
                Risultati stagionali & Classifica 
            </p>

            <!-- RISULTATI -->
            <div class="results-box">
                <div class="results-header">
                    <span>Risultati</span>
                </div>

                <div id="results-list" class="results-list">
                    <!-- popolato via JS -->
                </div>
            </div>

            <!-- CLASSIFICA -->
            <div class="standings-box">
                <div class="results-header">
                    <span>Classifica</span>
                </div>

                <div id="standings-list">
                    <!-- popolato via JS -->
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <div class="footer-logo">
                <img src="images/logo.jpg" alt="Logo Fino Demons">
            </div>
            <p class="footer-text">Fino Demons - Fino Mornasco (CO)</p>
            <p class="footer-text">&copy; 2026 Fino Demons</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="js/results.js"></script>

</body>
</html>
